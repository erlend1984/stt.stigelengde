services:
  - type: web
    name: stt-webhook-backend
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: STT_WEBHOOK_SECRET
        sync: false
      - key: STT_ADDRESS_API_BASE
        value: https://ws.geonorge.no/adresser/v1
      - key: STT_DEFAULT_CHIMNEY_ABOVE_RIDGE_CM
        value: "80"
      - key: STT_PLATFORM_THRESHOLD_CM
        value: "120"
      - key: STT_SAFETY_MARGIN_CM
        value: "45"
      - key: STT_CONFIDENCE_THRESHOLD
        value: "0.72"
      - key: STT_AERIAL_PROVIDER
        value: kartverket_nib_screenshot
